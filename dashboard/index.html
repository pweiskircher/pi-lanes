<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>pi lanes dashboard</title>
    <style>
      body { font-family: ui-sans-serif, system-ui, sans-serif; margin: 0; background: #111827; color: #f9fafb; }
      header { padding: 16px 20px; border-bottom: 1px solid #374151; display:flex; justify-content:space-between; align-items:center; }
      main { display: grid; grid-template-columns: 320px 1fr; min-height: calc(100vh - 65px); }
      aside { border-right: 1px solid #374151; padding: 12px; overflow:auto; }
      section { padding: 16px; overflow:auto; }
      .lane-card { border: 1px solid #374151; border-radius: 10px; padding: 12px; margin-bottom: 10px; cursor: pointer; background:#0f172a; }
      .lane-card.active { border-color: #60a5fa; }
      .muted { color: #9ca3af; }
      .pill { display:inline-block; padding: 2px 8px; border-radius: 999px; background:#1f2937; font-size: 12px; margin-right: 6px; }
      .todo { border: 1px solid #374151; border-radius: 8px; padding: 10px; margin-bottom: 8px; background:#0b1220; }
      .row { display:flex; gap: 8px; align-items:center; flex-wrap: wrap; }
      input, textarea, select, button { border-radius: 8px; border: 1px solid #4b5563; background:#111827; color:#f9fafb; padding: 8px; }
      textarea { width: 100%; min-height: 70px; }
      input[type=text] { min-width: 220px; }
      button { cursor: pointer; }
      h2, h3 { margin-top: 0; }
      .grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 8px; margin-bottom: 16px; }
      .panel { border: 1px solid #374151; border-radius: 10px; padding: 12px; background:#0f172a; margin-bottom: 14px; }
      .lane-header { padding: 14px 16px; }
      .lane-meta { display:flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
      .status-proposed { color: #fbbf24; }
      .status-live { color: #34d399; }
      .status-busy { color: #f59e0b; }
      .status-open { color: #93c5fd; }
      .event { border-top: 1px solid #374151; padding: 8px 0; }
      .message { border-top: 1px solid #374151; padding: 12px 0; }
      .message-role { font-size: 12px; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.04em; }
      .message.user .message-body { border-left: 3px solid #60a5fa; padding-left: 12px; }
      .message.assistant .message-body { border-left: 3px solid #34d399; padding-left: 12px; }
      .message-body { white-space: pre-wrap; margin-top: 6px; line-height: 1.45; }
      .conversation-scroll { max-height: 420px; overflow: auto; padding-right: 8px; }
      .composer textarea { min-height: 92px; }
      details { margin-top: 12px; }
      details > summary { cursor: pointer; user-select: none; }
      .status-in_progress { color: #a78bfa; }
      .status-blocked { color: #f87171; }
      .status-done { color: #34d399; }
      .status-dropped { color: #9ca3af; }
    </style>
  </head>
  <body>
    <header>
      <strong>pi lanes dashboard</strong>
      <button id="refreshButton">Refresh</button>
    </header>
    <main>
      <aside>
        <div id="laneList"></div>
      </aside>
      <section>
        <div id="laneDetail" class="muted">Select a lane.</div>
      </section>
    </main>
    <script>
      const SELECTED_LANE_STORAGE_KEY = 'pi-lanes.selected-lane-id';
      let selectedLaneId = loadSelectedLaneId();
      let snapshot = [];
      let selectedLaneUiState = createDefaultLaneUiState();

      document.getElementById('refreshButton').addEventListener('click', refresh);
      setInterval(() => {
        void refresh();
      }, 10000);

      async function refresh() {
        captureLaneUiState();
        const response = await fetch('/api/snapshot');
        const data = await response.json();
        snapshot = data.lanes;

        if (selectedLaneId && !snapshot.some(lane => lane.lane.id === selectedLaneId)) {
          selectedLaneId = null;
          saveSelectedLaneId(null);
          selectedLaneUiState = createDefaultLaneUiState();
        }

        renderLaneList();
        if (selectedLaneId) {
          await loadLane(selectedLaneId);
        }
      }

      function renderLaneList() {
        const container = document.getElementById('laneList');
        container.innerHTML = '';
        for (const lane of snapshot) {
          const card = document.createElement('div');
          card.className = 'lane-card' + (lane.lane.id === selectedLaneId ? ' active' : '');
          card.innerHTML = `
            <div><strong>${escapeHtml(lane.lane.id)}</strong></div>
            <div class="muted">${escapeHtml(lane.lane.title)}</div>
            <div class="row" style="margin-top:8px;">
              <span class="pill">repo ${escapeHtml(shortRepo(lane.lane.repoPath))}</span>
              <span class="pill">open ${lane.todoCounts.open}</span>
              <span class="pill">proposed ${lane.todoCounts.proposed}</span>
              ${lane.liveSessionHealth?.ok ? `<span class="pill ${lane.liveSessionHealth.isIdle ? 'status-live' : 'status-busy'}">${lane.liveSessionHealth.isIdle ? 'idle' : 'busy'}</span>` : ''}
            </div>
          `;
          card.addEventListener('click', () => loadLane(lane.lane.id));
          container.appendChild(card);
        }
      }

      async function loadLane(laneId) {
        if (selectedLaneId !== laneId) {
          selectedLaneUiState = createDefaultLaneUiState();
        }
        selectedLaneId = laneId;
        saveSelectedLaneId(laneId);
        renderLaneList();
        const response = await fetch(`/api/lanes/${encodeURIComponent(laneId)}`);
        const data = await response.json();
        renderLaneDetail(data.lane);
        restoreLaneUiState();
        scrollConversationToBottom();
      }

      function renderLaneDetail(detail) {
        const container = document.getElementById('laneDetail');
        const runtime = detail.runtimeState || {};
        container.innerHTML = `
          <div class="panel lane-header">
            <h2 style="margin-bottom:4px;">${escapeHtml(detail.lane.id)}</h2>
            <div class="muted">${escapeHtml(detail.lane.title)}</div>
            <div class="lane-meta">
              <span class="pill">mode ${escapeHtml(runtime.mode || 'stopped')}</span>
              <span class="pill">todo ${escapeHtml(runtime.currentTodoId || '—')}</span>
              <span class="pill">health ${detail.liveSessionHealth?.ok ? (detail.liveSessionHealth.isIdle ? 'idle' : 'busy') : 'offline'}</span>
              <span class="pill">activity ${escapeHtml(formatRelativeTime(detail.liveSessionHealth?.lastActivityAt))}</span>
            </div>
            <details>
              <summary>Lane details</summary>
              <div class="lane-meta" style="margin-top:10px;">
                <span class="pill">repo ${escapeHtml(shortRepo(detail.lane.repoPath))}</span>
                <span class="pill">bookmark ${escapeHtml(detail.lane.jjBookmark || '—')}</span>
                <span class="pill">bridge ${runtime.messageBridge ? `127.0.0.1:${escapeHtml(String(runtime.messageBridge.port))}` : 'offline'}</span>
                <span class="pill">last activity ${escapeHtml(formatTimestamp(detail.liveSessionHealth?.lastActivityAt))}</span>
              </div>
            </details>
          </div>

          <div class="panel">
            <h3>Recent conversation</h3>
            <div class="muted">Last 10 lane messages, formatted for quick steering.</div>
            <div id="conversationScroll" class="conversation-scroll" style="margin-top:12px;">
              ${(detail.liveSession?.recentMessages || []).length > 0 ? detail.liveSession.recentMessages.slice(-10).map(renderMessage).join('') : '<div class="muted">No recent session messages found.</div>'}
            </div>
          </div>

          <div class="panel composer">
            <h3>Send message</h3>
            <div class="muted">Send a steering message by default, or switch to follow-up.</div>
            <div class="row" style="margin-top:12px;">
              <select id="messageDeliveryMode">
                <option value="steer" selected>steer</option>
                <option value="followUp">follow up</option>
              </select>
              <button onclick="sendLaneMessage()" ${runtime.messageBridge ? '' : 'disabled'}>Send</button>
            </div>
            <textarea id="laneMessageText" placeholder="Tell the lane what to do next…" ${runtime.messageBridge ? '' : 'disabled'}></textarea>
            <div class="muted">${detail.liveSessionHealth?.ok ? `Lane is ${detail.liveSessionHealth.isIdle ? 'idle' : 'busy'}${detail.liveSessionHealth.lastEventSummary ? ` — ${escapeHtml(detail.liveSessionHealth.lastEventSummary)}` : ''}` : 'This lane is offline or was not started with the lane bridge.'}</div>
          </div>

          <div class="panel">
            <details id="laneSettingsDetails">
              <summary>Lane settings</summary>
              <div class="muted" style="margin-top:8px;">Lane-specific notes and configuration helpers.</div>
              <div style="margin-top:12px;">
                <strong>Lane context</strong>
              </div>
              <textarea id="laneContextText">${escapeHtml(detail.contextText || '')}</textarea>
              <div class="row">
                <button onclick="saveContext()">Save context</button>
              </div>
            </details>
          </div>

          <div class="panel">
            <details id="laneEventsDetails">
              <summary>Recent events</summary>
              <div style="margin-top:12px;">
                ${(detail.recentEvents || []).length > 0 ? detail.recentEvents.map(renderEvent).join('') : '<div class="muted">No recent events.</div>'}
              </div>
            </details>
          </div>

          <div class="panel">
            <h3>Add TODO</h3>
            <div class="row">
              <input id="newTitle" type="text" placeholder="TODO title">
              <select id="newPriority">
                <option value="medium">medium</option>
                <option value="high">high</option>
                <option value="low">low</option>
              </select>
              <button onclick="createTodo()">Add</button>
            </div>
            <textarea id="newNotes" placeholder="Optional notes"></textarea>
          </div>

          <div class="panel">
            <h3>TODOs</h3>
            ${detail.todos.map(renderTodo).join('') || '<div class="muted">No TODOs.</div>'}
          </div>
        `;
      }

      function renderMessage(message) {
        return `
          <div class="message ${escapeHtml(message.role)}">
            <div class="row" style="justify-content:space-between;">
              <div class="message-role">${escapeHtml(message.role)}</div>
              <span class="muted">${escapeHtml(formatTimestamp(message.timestamp))}</span>
            </div>
            <div class="message-body">${escapeHtml(message.content)}</div>
          </div>
        `;
      }

      function renderEvent(event) {
        return `
          <div class="event">
            <div class="row" style="justify-content:space-between;">
              <strong>${escapeHtml(event.kind)}</strong>
              <span class="muted">${escapeHtml(formatTimestamp(event.timestamp))}</span>
            </div>
            <div>${escapeHtml(event.summary)}</div>
            ${event.details ? `<div class="muted">${escapeHtml(event.details)}</div>` : ''}
          </div>
        `;
      }

      function renderTodo(todo) {
        const noteValue = todo.notes || '';
        return `
          <div class="todo">
            <div class="row" style="justify-content:space-between;">
              <div><strong>${escapeHtml(todo.id)}</strong> <span class="status-${escapeHtml(todo.status)}">[${escapeHtml(todo.status)}]</span></div>
              <div class="row">
                ${todo.status === 'proposed' ? `<button onclick="approveTodo('${todo.id}')">Approve</button><button onclick="rejectTodo('${todo.id}')">Reject</button>` : ''}
                <button onclick="deleteTodo('${todo.id}')">Delete</button>
              </div>
            </div>
            <div class="row" style="margin-top:8px;">
              <input id="title-${todo.id}" type="text" value="${escapeHtmlAttr(todo.title)}">
              <select id="priority-${todo.id}">
                ${['low','medium','high'].map(priority => `<option value="${priority}" ${todo.priority === priority ? 'selected' : ''}>${priority}</option>`).join('')}
              </select>
              <select id="status-${todo.id}">
                ${['open','in_progress','blocked','done','dropped'].map(status => `<option value="${status}" ${todo.status === status ? 'selected' : ''}>${status}</option>`).join('')}
              </select>
            </div>
            <textarea id="notes-${todo.id}">${escapeHtml(noteValue)}</textarea>
            <div class="row">
              <button onclick="saveTodo('${todo.id}')">Save</button>
              ${todo.status !== 'proposed' ? `<button onclick="setStatus('${todo.id}')">Set status</button>` : ''}
            </div>
            ${todo.proposalReason ? `<div class="muted">Reason: ${escapeHtml(todo.proposalReason)}</div>` : ''}
          </div>
        `;
      }

      async function createTodo() {
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/todos`, {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({
            title: document.getElementById('newTitle').value,
            priority: document.getElementById('newPriority').value,
            notes: document.getElementById('newNotes').value,
          }),
        });
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function saveContext() {
        captureLaneUiState();
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/context`, {
          method: 'PATCH',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({
            text: document.getElementById('laneContextText').value,
          }),
        });
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function sendLaneMessage() {
        captureLaneUiState();
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/message`, {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({
            message: document.getElementById('laneMessageText').value,
            deliverAs: document.getElementById('messageDeliveryMode').value,
          }),
        });
        selectedLaneUiState.messageText = '';
        await refresh();
        await loadLane(selectedLaneId);
        scrollConversationToBottom();
      }

      async function saveTodo(todoId) {
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/todos/${encodeURIComponent(todoId)}`, {
          method: 'PATCH',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({
            title: document.getElementById(`title-${todoId}`).value,
            priority: document.getElementById(`priority-${todoId}`).value,
            notes: document.getElementById(`notes-${todoId}`).value,
          }),
        });
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function setStatus(todoId) {
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/todos/${encodeURIComponent(todoId)}/status`, {
          method: 'POST',
          headers: {'content-type': 'application/json'},
          body: JSON.stringify({status: document.getElementById(`status-${todoId}`).value}),
        });
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function approveTodo(todoId) {
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/todos/${encodeURIComponent(todoId)}/approve`, {method: 'POST'});
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function rejectTodo(todoId) {
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/todos/${encodeURIComponent(todoId)}/reject`, {method: 'POST'});
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function deleteTodo(todoId) {
        await api(`/api/lanes/${encodeURIComponent(selectedLaneId)}/todos/${encodeURIComponent(todoId)}`, {method: 'DELETE'});
        await refresh();
        await loadLane(selectedLaneId);
      }

      async function api(url, options) {
        const response = await fetch(url, options);
        const data = await response.json();
        if (!response.ok || data.ok === false) {
          throw new Error(data.error || `Request failed: ${response.status}`);
        }
        return data;
      }

      function shortRepo(value) {
        const parts = String(value).split('/').filter(Boolean);
        return parts.slice(-2).join('/') || value;
      }

      function createDefaultLaneUiState() {
        return {
          messageText: '',
          messageDeliveryMode: 'steer',
          contextText: '',
          settingsOpen: false,
          eventsOpen: false,
        };
      }

      function captureLaneUiState() {
        selectedLaneUiState = {
          messageText: document.getElementById('laneMessageText')?.value || '',
          messageDeliveryMode: document.getElementById('messageDeliveryMode')?.value || 'steer',
          contextText: document.getElementById('laneContextText')?.value || '',
          settingsOpen: document.getElementById('laneSettingsDetails')?.open === true,
          eventsOpen: document.getElementById('laneEventsDetails')?.open === true,
        };
      }

      function restoreLaneUiState() {
        const messageText = document.getElementById('laneMessageText');
        if (messageText) messageText.value = selectedLaneUiState.messageText;
        const messageDeliveryMode = document.getElementById('messageDeliveryMode');
        if (messageDeliveryMode) messageDeliveryMode.value = selectedLaneUiState.messageDeliveryMode;
        const contextText = document.getElementById('laneContextText');
        if (contextText) contextText.value = selectedLaneUiState.contextText || contextText.value;
        const settingsDetails = document.getElementById('laneSettingsDetails');
        if (settingsDetails) settingsDetails.open = selectedLaneUiState.settingsOpen;
        const eventsDetails = document.getElementById('laneEventsDetails');
        if (eventsDetails) eventsDetails.open = selectedLaneUiState.eventsOpen;
      }

      function scrollConversationToBottom() {
        const element = document.getElementById('conversationScroll');
        if (!element) return;
        element.scrollTop = element.scrollHeight;
      }

      function loadSelectedLaneId() {
        try {
          return window.localStorage.getItem(SELECTED_LANE_STORAGE_KEY);
        } catch {
          return null;
        }
      }

      function saveSelectedLaneId(value) {
        try {
          if (value) {
            window.localStorage.setItem(SELECTED_LANE_STORAGE_KEY, value);
          } else {
            window.localStorage.removeItem(SELECTED_LANE_STORAGE_KEY);
          }
        } catch {
          // Ignore localStorage failures.
        }
      }

      function formatTimestamp(value) {
        if (!value) return '—';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        return date.toLocaleString();
      }

      function formatRelativeTime(value) {
        if (!value) return '—';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return String(value);
        const diffMs = Date.now() - date.getTime();
        const diffMinutes = Math.floor(diffMs / 60000);
        if (diffMinutes < 1) return 'just now';
        if (diffMinutes < 60) return `${diffMinutes}m ago`;
        const diffHours = Math.floor(diffMinutes / 60);
        if (diffHours < 24) return `${diffHours}h ago`;
        const diffDays = Math.floor(diffHours / 24);
        return `${diffDays}d ago`;
      }

      function escapeHtml(value) {
        return String(value).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
      }

      function escapeHtmlAttr(value) {
        return escapeHtml(value).replaceAll('"', '&quot;');
      }

      refresh();
    </script>
  </body>
</html>
